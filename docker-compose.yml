services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: migration
      POSTGRES_PASSWORD: migration
      POSTGRES_DB: migration_monitor
    ports:
      - "5432:5432"
    volumes:
      - migration_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migration -d migration_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  migration_postgres_data:
